name: Automated Preprocessing

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.7'

    - name: Install dependencies
      run: |
        pip install pandas numpy scikit-learn

    - name: Run preprocessing
      run: |
        python preprocessing/automate_Nurhayati_Kusumaning_Ayu_apc617d6x022.py \
          --input credit_risk_dataset.csv \
          --output preprocessing/credit_risk_dataset_preprocessing

    - name: Upload preprocessed data
      uses: actions/upload-artifact@v3
      with:
        name: credit_risk_preprocessed
        path: preprocessing/credit_risk_dataset_preprocessing/

    - name: Commit preprocessed data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add preprocessing/credit_risk_dataset_preprocessing/
        git diff --staged --quiet || git commit -m "Auto: update preprocessed dataset"
        git push